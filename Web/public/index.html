<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Todoer</title>
    <link rel="stylesheet" href="/style.css?v=15.7">
    <script src="https://cdn.sheetjs.com/xlsx-0.20.1/package/dist/xlsx.full.min.js"></script>
</head>
<body>
<div class="container">
    <header class="header">
        <h2>Todoer</h2>
        <div id="user-info" class="header-actions" style="display:none;">
            <button id="export-btn" class="btn-action-nav">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                </div>
                <span>Export</span>
            </button>
            <button id="btn-logout" class="btn-action-nav">
                <div class="icon-wrapper">
                    <svg viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M9 21H5a2 2 0 0 1-2-2V5a2 2 0 0 1 2-2h4"></path><polyline points="16 17 21 12 16 7"></polyline><line x1="21" y1="12" x2="9" y2="12"></line></svg>
                </div>
                <span>Logout</span>
            </button>
        </div>
    </header>

    <div id="login-prompt">
        <button id="btn-login" class="btn-primary">Sign in with Google</button>
    </div>

    <div id="app-content" style="display:none;">
        <div class="search-container">
            <input type="text" id="search-lists" placeholder="Search lists...">
            <div class="filter-bar">
                <button id="filter-all" class="btn-filter active">All</button>
                <button id="filter-todo" class="btn-filter">Todo</button>
                <button id="filter-done" class="btn-filter">Done</button>
            </div>
        </div>
        <div id="data-display"></div>
        <button id="btn-new-list" title="New List">+</button>
    </div>
</div>
<script type="module" src="/app.js?v=15.7"></script>
</body>
</html>
